    "title": "Web3是什么",
    "url": "./\/post\/2026\/02\/01\/web3%E6%98%AF%E4%BB%80%E4%B9%88\/",
    "date": "1032年9月20日",
    "content": "从Web1.0到Web3的演进：互联网的重塑 要理解Web3，我们需要回到互联网发展的历史轨迹上。在过去的几十年中，互联网经历了从信息呈现到用户参与，再到用户拥有的根本性变革。这不仅是技术的进步，更是权力结构的重新分配。\nWeb 1.0（1990年代）：信息的单向搬运 Web 1.0时代，互联网是一个巨大的数字图书馆。用户是信息的被动接收者，只能浏览静态的HTML网页。这个时代诞生了雅虎、网易等门户网站，它们提供了互联网的入口。\n在Web 1.0时代，技术架构相对简单。网页主要由HTML、CSS和基础的JavaScript构成，没有复杂的后台系统。数据存储在文件系统中，内容由网站管理员发布和更新。用户与网站的互动极其有限，最多是通过电子邮件表单或简单的留言板进行反馈。\n技术特征：\n静态HTML页面 基于文件系统的内容管理 单向信息流动（从服务器到客户端） 有限的后台处理能力 用户体验：\n\u0026ldquo;只能看，不能改\u0026rdquo;——用户是旁观者 互联网公司提供什么，用户就接收什么 没有个性化推荐，内容千人一面 Web 2.0（2004年至今）：平台的打工人 Web 2.0时代标志着互联网的质变。社交媒体和移动互联网的兴起，让用户从信息的被动接收者转变为主动参与者。Facebook、Twitter、YouTube、抖音、微信、小红书等平台让每个人都能发声、创造内容、与世界连接。\n这个时代的核心技术包括：\n动态网页技术（PHP、Ruby on Rails、Django等） 关系型数据库（MySQL、PostgreSQL） RESTful API架构 移动应用开发 然而，在Web 2.0时代，一个尖锐的矛盾逐渐显现：用户创造了内容，但内容的所有权和收益权归平台所有。如果你被封号，你的社交关系、发布的内容、积累的粉丝都会瞬间消失。数据成为平台垄断的资源，而非用户的资产。\n技术特征：\n动态内容生成和数据库存储 用户生成内容（UGC）机制 云计算和分布式架构 社交图谱和个性化算法 用户体验：\n\u0026ldquo;可读可写，但不拥有\u0026rdquo;——用户是活跃的参与者 内容创造者，但不是内容所有者 享受便利，但牺牲数据主权 权力结构问题：\n中心化服务器存储所有数据 平台制定规则并随时可改变 用户账号可随时被封禁 数据价值被平台单方面变现 Web 3.0（语义网愿景）：让机器理解数据 Web 3.0是由互联网之父蒂姆·伯纳斯-李（Tim Berners-Lee）提出的愿景，其核心是让机器能够理解网页内容的语义，而不仅仅是处理文本。这被称为\u0026quot;语义网\u0026quot;（Semantic Web）。\n核心理念： 当前的搜索引擎是基于关键词匹配的。当你搜索\u0026quot;20度有海鲜的城市\u0026quot;时，搜索引擎会查找包含这些关键词的网页，而不会真正理解你的需求。Web 3.0的目标是让机器能够理解数据之间的关系和含义，从而提供更精准的服务。\n技术实现：\nRDF（Resource Description Framework）：一种数据模型，用于描述网络资源的属性和关系 OWL（Web Ontology Language）：用于定义和实例化网络本体 SPARQL：用于查询RDF数据的查询语言 知识图谱：结构化的知识表示方式，如Google Knowledge Graph 实际应用示例： 在语义网的世界里，数据不再是孤立的网页，而是一个互联的知识网络。当你查询\u0026quot;老舍的作品\u0026quot;时，系统能够理解：\n\u0026ldquo;老舍\u0026quot;是\u0026quot;作家\u0026rdquo; \u0026ldquo;茶馆\u0026quot;是他的\u0026quot;作品\u0026rdquo; \u0026ldquo;骆驼祥子\u0026quot;也是他的\u0026quot;作品\u0026rdquo; \u0026ldquo;话剧\u0026quot;是\u0026quot;茶馆\u0026quot;的\u0026quot;类型\u0026rdquo; 这种理解能力使得AI和机器能够提供真正智能的服务，而不是简单的关键词匹配。\n",
    "tags": "[\"Web3\",\"区块链\"]"
  }];

document.addEventListener('DOMContentLoaded', function() {
  function adjustLayout() {
    const header = document.querySelector('header');
    const main = document.querySelector('main');
    const searchModal = document.getElementById('search-modal');
    if (header && main) {
      main.style.paddingTop = (header.offsetHeight + 10) + 'px';
    }
    if (header && searchModal) {
      searchModal.style.top = header.offsetHeight + 'px';
    }
  }
  adjustLayout();
  window.addEventListener('resize', adjustLayout);

  function loadHitokoto() {
    const hitokotoText = document.getElementById('hitokoto-text');
    const hitokotoAuthor = document.getElementById('hitokoto-author');
    if (!hitokotoText) return;

    if (typeof getRandomHitokoto === 'function') {
      const quote = getRandomHitokoto();
      hitokotoText.textContent = quote.text;
      hitokotoText.style.opacity = '1';
      
      if (hitokotoAuthor) {
        let authorText = '';
        if (quote.author) {
          authorText = '—— ' + quote.author;
        } else if (quote.from) {
          authorText = '—— ' + quote.from;
        }
        hitokotoAuthor.textContent = authorText;
      }
    }
  }
  loadHitokoto();

  const searchToggle = document.getElementById('search-toggle');
  const searchModal = document.getElementById('search-modal');
  const searchInput = document.getElementById('search-input');
  const searchClose = document.getElementById('search-close');
  const searchResults = document.getElementById('search-results');

  function toggleSearchModal(show) {
    if (show) {
      searchModal.classList.add('active');
      searchInput.focus();
    } else {
      searchModal.classList.remove('active');
      searchInput.value = '';
      searchResults.innerHTML = '';
    }
  }

  searchToggle?.addEventListener('click', function() {
    toggleSearchModal(!searchModal.classList.contains('active'));
  });

  searchClose?.addEventListener('click', function() {
    toggleSearchModal(false);
  });

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
      toggleSearchModal(false);
    }
    if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
      e.preventDefault();
      toggleSearchModal(!searchModal.classList.contains('active'));
    }
  });

  searchInput?.addEventListener('input', function() {
    const query = this.value.trim().toLowerCase();
    
    if (!query) {
      searchResults.innerHTML = '';
      return;
    }

    const sanitizedQuery = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    const results = searchData.filter(item => {
      const titleMatch = item.title?.toLowerCase().includes(query);
      const contentMatch = item.content?.toLowerCase().includes(query);
      const tagsMatch = Array.isArray(item.tags) && item.tags.some(tag => 
        typeof tag === 'string' && tag.toLowerCase().includes(query)
      );
      return titleMatch || contentMatch || tagsMatch;
    });

    displayResults(results, sanitizedQuery);
  });

  function highlightText(text, query) {
    if (!query || !text) return text;
    try {
      const regex = new RegExp(`(${query})`, 'gi');
      return text.replace(regex, '<span class="search-highlight">$1</span>');
    } catch {
      return text;
    }
  }

  function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  function displayResults(results, query) {
    if (results.length === 0) {
      searchResults.innerHTML = '<div class="no-results">未找到匹配的文章</div>';
      return;
    }

    searchResults.innerHTML = results.slice(0, 10).map(item => {
      const safeTitle = highlightText(escapeHtml(item.title || ''), query);
      const safeExcerpt = highlightText(escapeHtml(getExcerpt(item.content || '')), query);
      const safeUrl = escapeHtml(item.url || '#');
      const safeDate = escapeHtml(item.date || '');
      return `
        <div class="search-result-item">
          <a href="${safeUrl}" class="search-result-title">${safeTitle}</a>
          <p class="search-result-excerpt">${safeExcerpt}</p>
          <div class="search-result-meta">${safeDate}</div>
        </div>
      `;
    }).join('');
  }

  function getExcerpt(content) {
    if (!content) return '';
    const text = content.substring(0, 150);
    return text.endsWith(' ') ? text.trim() : text.trim() + '...';
  }

  const themeToggle = document.getElementById('theme-toggle');
  const sunIcon = document.getElementById('sun-icon');
  const moonIcon = document.getElementById('moon-icon');

  function setTheme(theme) {
    if (!['light', 'dark'].includes(theme)) {
      theme = 'light';
    }
    document.documentElement.setAttribute('data-theme', theme);
    localStorage.setItem('theme', theme);
    sunIcon.style.display = theme === 'dark' ? 'none' : 'block';
    moonIcon.style.display = theme === 'dark' ? 'block' : 'none';
  }

  const savedTheme = localStorage.getItem('theme') || 'light';
  setTheme(savedTheme);

  themeToggle?.addEventListener('click', function() {
    const currentTheme = document.documentElement.getAttribute('data-theme');
    const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
    setTheme(newTheme);
  });

  const backToTop = document.getElementById('back-to-top');
  if (backToTop) {
    window.addEventListener('scroll', function() {
      if (window.scrollY > 300) {
        backToTop.classList.add('visible');
      } else {
        backToTop.classList.remove('visible');
      }
    });
    backToTop.addEventListener('click', function() {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
  }
});
</script>

</body>
</html>
