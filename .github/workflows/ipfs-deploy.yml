name: Deploy to IPFS

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-ipfs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.161.0'
          extended: true

      - name: Build Hugo site
        run: hugo --minify

      - name: Install IPFS
        run: |
          curl -L https://dist.ipfs.tech/kubo/v0.28.0/kubo_v0.28.0_linux-amd64.tar.gz -o /tmp/kubo.tar.gz
          tar -xzf /tmp/kubo.tar.gz -C /tmp
          sudo mv /tmp/kubo/ipfs /usr/local/bin/
          ipfs init --profile=lowpower

      - name: Add to IPFS and publish
        id: ipfs-add
        run: |
          cd public
          CID=$(ipfs add -rQ .)
          ipfs name publish $CID || true
          echo "cid=$CID" >> $GITHUB_OUTPUT
          echo "📦 Directory CID: $CID"

      - name: Show results
        run: |
          echo ""
          echo "✅ IPFS Deployment completed!"
          echo ""
          echo "🪐 Site CID: ${{ steps.ipfs-add.outputs.cid }}"
          echo ""
          echo "🌐 Access via gateways:"
          echo "  • https://ipfs.io/ipfs/${{ steps.ipfs-add.outputs.cid }}/"
          echo "  • https://cloudflare-ipfs.com/ipfs/${{ steps.ipfs-add.outputs.cid }}/"
          echo "  • https://dweb.link/ipfs/${{ steps.ipfs-add.outputs.cid }}/"
          echo ""
          echo "💡 To ensure permanent availability:"
          echo "  1. Copy the CID: ${{ steps.ipfs-add.outputs.cid }}"
          echo "  2. Go to https://app.pinata.cloud/pinmanager"
          echo "  3. Click 'Pin by CID' and paste the CID"
          echo "  4. Done! Your site will be permanently available."