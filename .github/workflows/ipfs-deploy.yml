name: Deploy to IPFS via nft.storage

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-ipfs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.161.0'
          extended: true

      - name: Build Hugo site
        run: hugo --minify

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install requests
        run: pip install requests

      - name: Deploy to IPFS via nft.storage
        env:
          NFT_STORAGE_TOKEN: ${{ secrets.NFT_STORAGE_TOKEN }}
        run: |
          python3 << 'PYTHON_SCRIPT'
          import os
          import requests
          import tarfile
          import io

          url = "https://api.nft.storage/upload"
          headers = {"Authorization": f"Bearer {os.environ['NFT_STORAGE_TOKEN']}"}

          tar_buffer = io.BytesIO()
          with tarfile.open(fileobj=tar_buffer, mode='w:gz') as tar:
              tar.add("public", arcname="")
          tar_buffer.seek(0)

          response = requests.post(url, headers=headers, files={"file": ("site.tar.gz", tar_buffer)})

          if response.status_code == 200:
              result = response.json()
              cid = result.get("value", {}).get("cid")
              print(f"✅ Success! CID: {cid}")
              print(f"🌐 Access: https://{cid}.ipfs.nftstorage.link/")
              print(f"🌐 IPFS.io: https://ipfs.io/ipfs/{cid}/")
          else:
              print(f"❌ Failed: {response.text}")
              exit(1)
          PYTHON_SCRIPT