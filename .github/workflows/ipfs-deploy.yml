name: Deploy to IPFS via Pinata

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-ipfs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.161.0'
          extended: true

      - name: Build Hugo site
        run: hugo --minify

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install ipfs-car
        run: npm install -g ipfs-car

      - name: Create CAR file from public directory
        run: |
          cd public
          ipfs-car pack . --output ../site.car
          ls -la ../site.car

      - name: Deploy to Pinata
        run: |
          RESPONSE=$(curl -s -X POST "https://api.pinata.cloud/pinning/pinFileToIPFS" \
            -H "Authorization: Bearer ${{ secrets.PINATA_JWT_TOKEN }}" \
            -F "file=@site.car")
          
          echo "Response: $RESPONSE"
          
          if echo "$RESPONSE" | grep -q "IpfsHash"; then
            CID=$(echo "$RESPONSE" | grep -o '"IpfsHash":"[^"]*' | cut -d'"' -f4)
            echo "✅ Successfully deployed to IPFS!"
            echo "CID: $CID"
            echo ""
            echo "🌐 Access your site at:"
            echo "https://gateway.pinata.cloud/ipfs/$CID/"
            echo "https://ipfs.io/ipfs/$CID/"
          else
            echo "❌ Deployment failed!"
            exit 1
          fi