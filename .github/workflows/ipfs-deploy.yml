name: Deploy to IPFS via nft.storage

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-ipfs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.161.0'
          extended: true

      - name: Build Hugo site
        run: hugo --minify

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install nft.storage CLI
        run: npm install -g nft.storage

      - name: Deploy to IPFS
        env:
          NFT_STORAGE_TOKEN: ${{ secrets.NFT_STORAGE_TOKEN }}
        run: |
          nft.storage upload public --recursive --output json > result.json
          
          CID=$(cat result.json | grep -o '"cid":"[^"]*' | cut -d'"' -f4)
          echo ""
          echo "✅ Successfully deployed to IPFS!"
          echo "CID: $CID"
          echo ""
          echo "🌐 Access your site at:"
          echo "https://${CID}.ipfs.nftstorage.link/"
          echo "https://ipfs.io/ipfs/${CID}/"