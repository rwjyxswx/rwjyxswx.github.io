name: Deploy to IPFS via Pinata

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-ipfs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.161.0'
          extended: true

      - name: Build Hugo site
        run: hugo --minify

      - name: Install IPFS
        run: |
          # Download and install IPFS CLI
          curl -L https://dist.ipfs.tech/kubo/v0.28.0/kubo_v0.28.0_linux-amd64.tar.gz -o /tmp/kubo.tar.gz
          tar -xzf /tmp/kubo.tar.gz -C /tmp
          sudo mv /tmp/kubo/ipfs /usr/local/bin/ipfs
          sudo mv /tmp/kubo/ipfs-watch /usr/local/bin/ipfs-watch 2>/dev/null || true
          ipfs version

      - name: Start IPFS daemon
        run: |
          ipfs daemon --init &
          sleep 5
          ipfs id

      - name: Add files to IPFS
        id: add
        run: |
          # Add public directory to IPFS with directory wrapping
          CID=$(ipfs add -r -w public/ | tail -n 1 | awk '{print $2}')
          echo "root_cid=$CID" >> $GITHUB_OUTPUT
          echo "📦 Added to IPFS with CID: $CID"

      - name: Pin to Pinata
        run: |
          curl -X POST "https://api.pinata.cloud/pinning/pinByHash" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.PINATA_JWT_TOKEN }}" \
            -d "{
              \"hashToPin\": \"${{ steps.add.outputs.root_cid }}\",
              \"metadata\": {
                \"name\": \"miluoblog-${{ github.run_number }}\"
              }
            }"

      - name: Show results
        run: |
          echo "✅ Successfully deployed to IPFS!"
          echo ""
          echo "CID: ${{ steps.add.outputs.root_cid }}"
          echo ""
          echo "🌐 Access your site at:"
          echo "https://gateway.pinata.cloud/ipfs/${{ steps.add.outputs.root_cid }}"
          echo "https://ipfs.io/ipfs/${{ steps.add.outputs.root_cid }}"
          echo "https://cloudflare-ipfs.com/ipfs/${{ steps.add.outputs.root_cid }}"
          echo ""
          echo "📋 Note: It may take a few minutes for the content to propagate to all gateways."
