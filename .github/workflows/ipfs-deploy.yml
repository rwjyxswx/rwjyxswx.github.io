name: Deploy to IPFS via Pinata

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-ipfs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.161.0'
          extended: true

      - name: Build Hugo site
        run: hugo --minify

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install ipfs-car
        run: npm install -g ipfs-car

      - name: Create CAR file and get CID
        id: create-car
        run: |
          cd public
          ipfs-car pack . --output ../site.car --list
          CID=$(ipfs-car pack . --dry-run | grep -o 'root.*' | awk '{print $2}')
          echo "cid=$CID" >> $GITHUB_OUTPUT
          echo "📦 Directory CID: $CID"

      - name: Pin to Pinata with CAR file
        env:
          PINATA_JWT: ${{ secrets.PINATA_JWT_TOKEN }}
        run: |
          RESPONSE=$(curl -s -X POST "https://api.pinata.cloud/pinning/pinFileToIPFS" \
            -H "Authorization: Bearer $PINATA_JWT" \
            -F "file=@site.car;type=application/vnd.ipld.car")
          
          echo "Pinata Response: $RESPONSE"
          
          if echo "$RESPONSE" | grep -q "success.*true\|IpfsHash"; then
            echo "✅ Successfully pinned to Pinata!"
            echo "🌐 Access your site:"
            echo "https://gateway.pinata.cloud/ipfs/${{ steps.create-car.outputs.cid }}/"
            echo "https://ipfs.io/ipfs/${{ steps.create-car.outputs.cid }}/"
            echo "https://cloudflare-ipfs.com/ipfs/${{ steps.create-car.outputs.cid }}/"
          else
            echo "❌ Failed to pin: $RESPONSE"
            exit 1
          fi