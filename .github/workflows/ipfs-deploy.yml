name: Deploy to IPFS with Lighthouse

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-ipfs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.161.0'
          extended: true

      - name: Build Hugo site
        run: hugo --minify

      - name: Install Node.js and Lighthouse SDK
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install @lighthouse-web3/sdk

      - name: Deploy to Lighthouse
        env:
          LIGHTHOUSE_API_KEY: ${{ secrets.LIGHTHOUSE_API_KEY }}
        run: |
          node << 'END_SCRIPT'
          const lighthouse = require('@lighthouse-web3/sdk');
          
          const apiKey = process.env.LIGHTHOUSE_API_KEY;
          if (!apiKey) {
            console.error('❌ LIGHTHOUSE_API_KEY not set');
            process.exit(1);
          }

          const directoryPath = './public';

          const uploadResponse = await lighthouse.upload(directoryPath, apiKey);

          console.log('✅ Success!');
          console.log('CID:', uploadResponse.data.Hash);
          console.log('🌐 Access: https://gateway.lighthouse.storage/ipfs/' + uploadResponse.data.Hash + '/');
          console.log('🌐 Backup: https://ipfs.io/ipfs/' + uploadResponse.data.Hash + '/');
          END_SCRIPT
