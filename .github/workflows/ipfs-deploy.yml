name: Deploy to IPFS via Pinata

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-ipfs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.161.0'
          extended: true

      - name: Build Hugo site
        run: hugo --minify

      - name: Install IPFS
        run: |
          curl -L https://dist.ipfs.tech/kubo/v0.28.0/kubo_v0.28.0_linux-amd64.tar.gz -o /tmp/kubo.tar.gz
          tar -xzf /tmp/kubo.tar.gz -C /tmp
          sudo mv /tmp/kubo/ipfs /usr/local/bin/
          ipfs init

      - name: Add files to IPFS and get CID
        id: ipfs-add
        run: |
          cd public
          CID=$(ipfs add -rQ .)
          echo "directory_cid=$CID" >> $GITHUB_OUTPUT
          echo "📦 Directory CID: $CID"

      - name: Pin to Pinata
        run: |
          RESPONSE=$(curl -s -X POST "https://api.pinata.cloud/pinning/pinByHash" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.PINATA_JWT_TOKEN }}" \
            -d "{\"hashToPin\": \"${{ steps.ipfs-add.outputs.directory_cid }}\"}")
          
          if echo "$RESPONSE" | grep -q "IpfsHash"; then
            echo "✅ Successfully pinned to Pinata!"
            echo "🌐 Access your site at:"
            echo "https://gateway.pinata.cloud/ipfs/${{ steps.ipfs-add.outputs.directory_cid }}/"
            echo "https://ipfs.io/ipfs/${{ steps.ipfs-add.outputs.directory_cid }}/"
            echo "https://cloudflare-ipfs.com/ipfs/${{ steps.ipfs-add.outputs.directory_cid }}/"
          else
            echo "❌ Failed: $RESPONSE"
            exit 1
          fi