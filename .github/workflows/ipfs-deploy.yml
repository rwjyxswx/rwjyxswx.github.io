name: Deploy to IPFS with NFT.storage

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-ipfs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.161.0'
          extended: true

      - name: Build Hugo site
        run: hugo --minify

      - name: Deploy to NFT.storage
        env:
          NFT_STORAGE_TOKEN: ${{ secrets.NFT_STORAGE_TOKEN }}
        run: |
          # 安装 Kubo
          wget https://github.com/ipfs/kubo/releases/download/v0.28.0/kubo_v0.28.0_linux-amd64.tar.gz
          tar xzf kubo_v0.28.0_linux-amd64.tar.gz
          sudo cp kubo/ipfs /usr/local/bin/

          # 初始化 IPFS
          ipfs init

          # 添加目录到 IPFS 并获取 CID
          cd public
          CID=$(ipfs add -r -Q .)
          cd ..

          echo "📦 Directory CID: $CID"
          echo "📤 Exporting CAR file..."

          # 导出为 CAR 文件
          ipfs dag export $CID > site.car

          echo "📤 Uploading to NFT.storage..."

          # 上传到 NFT.storage
          RESPONSE=$(curl -X POST "https://api.nft.storage/upload" \
            -H "Authorization: Bearer $NFT_STORAGE_TOKEN" \
            -H "Content-Type: application/vnd.ipld.car" \
            --data-binary "@site.car")

          echo "📥 Response: $RESPONSE"

          echo "✅ Success!"
          echo "CID: $CID"
          echo "🌐 Access: https://ipfs.io/ipfs/$CID/"
          echo "🌐 NFT.storage Gateway: https://$CID.ipfs.nftstorage.link/"