name: Deploy to IPFS via Pinata

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-ipfs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.161.0'
          extended: true

      - name: Build Hugo site
        run: hugo --minify

      - name: Deploy to Pinata (direct upload)
        run: |
          # Navigate to public directory
          cd public
          
          # Create multipart form data for all files
          BOUNDARY="----WebKitFormBoundary$(date +%s)"
          
          # Start building the multipart body
          {
            echo "--$BOUNDARY"
            echo 'Content-Disposition: form-data; name="pinataMetadata"'
            echo 'Content-Type: application/json'
            echo ""
            echo "{\"name\":\"miluoblog-${{ github.sha }}\"}"
            
            echo "--$BOUNDARY"
            echo 'Content-Disposition: form-data; name="pinataOptions"'
            echo 'Content-Type: application/json'
            echo ""
            echo "{\"cidVersion\":1}"
            
            # Add each file
            find . -type f | while read -r filepath; do
              filename="${filepath#./}"
              echo "--$BOUNDARY"
              echo "Content-Disposition: form-data; name=\"file\"; filename=\"$filename\""
              echo "Content-Type: application/octet-stream"
              echo ""
              cat "$filepath"
            done
            
            echo "--$BOUNDARY--"
          } | curl -X POST "https://api.pinata.cloud/pinning/pinFileToIPFS" \
            -H "Authorization: Bearer ${{ secrets.PINATA_JWT_TOKEN }}" \
            -H "Content-Type: multipart/form-data; boundary=$BOUNDARY" \
            --data-binary @-
          
          echo ""
          echo "✅ Upload completed!"