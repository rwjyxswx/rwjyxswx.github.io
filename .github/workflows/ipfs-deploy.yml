name: Deploy to IPFS + Pinata

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install Hugo
        run: sudo apt-get install hugo -y

      - name: Build
        run: hugo --minify

      # 安装 IPFS
      - name: Install IPFS
        run: |
          wget https://dist.ipfs.tech/kubo/latest/kubo_linux-amd64.tar.gz
          tar -xvzf kubo_linux-amd64.tar.gz
          cd kubo && sudo bash install.sh

      - name: Start IPFS
        run: |
          ipfs init
          ipfs daemon & sleep 5

      # ✅ 关键：本地生成 CID（文件夹没问题）
      - name: Add folder to IPFS
        run: |
          CID=$(ipfs add -Qr public)
          echo "CID=$CID" >> $GITHUB_ENV

      # ✅ 关键：让 Pinata 只 pin CID
      - name: Pin CID to Pinata
        run: |
          curl -X POST "https://api.pinata.cloud/pinning/pinByHash" \
          -H "Authorization: Bearer ${{ secrets.PINATA_JWT }}" \
          -H "Content-Type: application/json" \
          -d "{\"hashToPin\":\"$CID\"}"

      - name: Output URL
        run: echo "https://ipfs.io/ipfs/$CID"