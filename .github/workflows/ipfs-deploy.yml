name: Deploy to IPFS via Pinata

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-ipfs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.161.0'
          extended: true

      - name: Build Hugo site
        run: hugo --minify

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install requests
        run: pip install requests

      - name: Deploy to Pinata
        env:
          PINATA_JWT: ${{ secrets.PINATA_JWT_TOKEN }}
        run: |
          python3 << 'PYTHON_SCRIPT'
          import os
          import requests
          import zipfile
          import io

          url = "https://api.pinata.cloud/pinning/pinFileToIPFS"
          headers = {"Authorization": f"Bearer {os.environ['PINATA_JWT']}"}

          public_dir = "public"
          zip_buffer = io.BytesIO()

          with zipfile.ZipFile(zip_buffer, 'w', zipfile.ZIP_DEFLATED) as zip_file:
              for root, dirs, files in os.walk(public_dir):
                  for file in files:
                      file_path = os.path.join(root, file)
                      arcname = os.path.relpath(file_path, public_dir)
                      zip_file.write(file_path, arcname)

          zip_buffer.seek(0)
          
          response = requests.post(
              url,
              headers=headers,
              files={"file": ("blog.zip", zip_buffer, "application/zip")}
          )

          if response.status_code == 200:
              result = response.json()
              cid = result.get("IpfsHash")
              print(f"✅ Success! CID: {cid}")
              print(f"🌐 Access: https://gateway.pinata.cloud/ipfs/{cid}")
          else:
              print(f"❌ Failed: {response.text}")
              exit(1)
          PYTHON_SCRIPT