name: Deploy to IPFS via Pinata

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-ipfs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.161.0'
          extended: true

      - name: Build Hugo site
        run: hugo --minify

      - name: Install ipfs-deploy
        run: npm install -g ipfs-deploy

      - name: Deploy to IPFS via Pinata
        env:
          IPFS_DEPLOY_PINATA__API_KEY: ${{ secrets.PINATA_API_KEY }}
          IPFS_DEPLOY_PINATA__SECRET_API_KEY: ${{ secrets.PINATA_SECRET_API_KEY }}
        run: |
          cd public
          ipd --provider pinata --no-open
        continue-on-error: true

      - name: Deploy to IPFS via Pinata (fallback)
        if: failure()
        run: |
          # Fallback: Use curl to upload directory
          cd public
          
          # Create tar archive
          tar -czf ../site.tar.gz .
          
          # Upload to Pinata using direct file upload
          curl -X POST "https://api.pinata.cloud/pinning/pinFileToIPFS" \
            -H "Content-Type: multipart/form-data" \
            -H "Authorization: Bearer ${{ secrets.PINATA_JWT_TOKEN }}" \
            -F "file=@../site.tar.gz" \
            -F "pinataMetadata={\"name\":\"miluoblog-${{ github.sha }}\"}" \
            -F "pinataOptions={\"cidVersion\":1}"
