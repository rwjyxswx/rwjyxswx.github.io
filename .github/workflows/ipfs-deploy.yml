name: Deploy to IPFS via Pinata

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-ipfs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.161.0'
          extended: true

      - name: Build Hugo site
        run: hugo --minify

      - name: Install IPFS
        run: |
          curl -L https://dist.ipfs.tech/kubo/v0.28.0/kubo_v0.28.0_linux-amd64.tar.gz -o /tmp/kubo.tar.gz
          tar -xzf /tmp/kubo.tar.gz -C /tmp
          sudo mv /tmp/kubo/ipfs /usr/local/bin/
          ipfs init --profile=lowpower

      - name: Create CAR file
        id: create-car
        run: |
          cd public
          ipfs add -rQ . > /tmp/cid.txt
          CID=$(cat /tmp/cid.txt)
          ipfs dag export $CID > ../site.car
          echo "cid=$CID" >> $GITHUB_OUTPUT
          echo "📦 Directory CID: $CID"

      - name: Pin to Pinata
        env:
          PINATA_JWT: ${{ secrets.PINATA_JWT_TOKEN }}
        run: |
          RESPONSE=$(curl -s -X POST "https://api.pinata.cloud/pinning/pinFileToIPFS" \
            -H "Authorization: Bearer $PINATA_JWT" \
            -F "file=@site.car")
          
          echo "Response: $RESPONSE"
          
          if echo "$RESPONSE" | grep -q "IpfsHash"; then
            echo "✅ Successfully pinned to Pinata!"
            echo "🌐 Access your site:"
            echo "https://gateway.pinata.cloud/ipfs/${{ steps.create-car.outputs.cid }}/"
            echo "https://ipfs.io/ipfs/${{ steps.create-car.outputs.cid }}/"
          else
            echo "❌ Failed: $RESPONSE"
            exit 1
          fi