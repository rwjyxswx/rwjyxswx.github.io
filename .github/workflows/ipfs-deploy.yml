name: Deploy to IPFS with NFT.storage

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-ipfs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.161.0'
          extended: true

      - name: Build Hugo site
        run: hugo --minify

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install w3cli
        run: npm install -g @web3-storage/w3cli

      - name: Deploy to NFT.storage
        env:
          NFT_STORAGE_TOKEN: ${{ secrets.NFT_STORAGE_TOKEN }}
        run: |
          cd public
          w3 up --no-wrap
          
          echo ""
          echo "✅ Successfully deployed to IPFS!"
          echo "🌐 Your site is now available on the IPFS network."