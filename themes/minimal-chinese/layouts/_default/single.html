{{ define "main" }}
  <div class="page-content">
    <article class="post-content">
      <h1>{{ .Title }}</h1>
      <div class="post-meta">
        <span>{{ .Date.Format "2006年1月2日" }}</span>
        {{ if .Params.tags }}
        <span>标签：{{ range .Params.tags }}<a href="{{ "tags/" | relURL }}{{ . | urlize }}/" class="tag">{{ . }}</a>{{ end }}</span>
        {{ end }}
      </div>
      {{ .Content }}
      <div class="tags">
        {{ if .Params.tags }}
        {{ range .Params.tags }}
        <a href="{{ "tags/" | relURL }}{{ . | urlize }}/" class="tag">{{ . }}</a>
        {{ end }}
        {{ end }}
      </div>
    </article>
  </div>
{{ end }}
