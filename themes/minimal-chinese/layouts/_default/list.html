{{ define "main" }}
  <div class="page-content">
    <h1>{{ .Title }}</h1>
    <ul class="post-list">
    {{ range .Pages }}
    <li class="post-item">
      <a href="{{ .Permalink }}" class="post-title">{{ .Title }}</a>
      <div class="post-meta">
        <span>{{ .Date.Format "2006年1月2日" }}</span>
      </div>
      <p class="post-excerpt">{{ .Summary }}</p>
    </li>
    {{ end }}
    </ul>
  </div>
{{ end }}
