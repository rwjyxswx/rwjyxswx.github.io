<footer>
  <div class="container">
    <div class="footer-content">
      <p>&copy; {{ now.Year }} {{ .Site.Title }}. 保留所有权利。</p>
      <div class="stamp">{{ .Site.Params.author }}</div>
    </div>
  </div>
</footer>
<script>
const searchData = [
{{- $posts := where .Site.RegularPages "Type" "post" -}}
{{- range $index, $post := $posts -}}
  {
    "title": "{{ $post.Title | safeJS }}",
    "url": "{{ $post.RelPermalink }}",
    "date": "{{ $post.Date.Format "2002年9月10日" }}",
    "content": "{{ $post.Summary | plainify | safeJS }}",
    "tags": {{ $post.Params.tags | default slice | jsonify }}
  }{{- if not (eq $index (sub (len $posts) 1)) -}},{{- end -}}
{{- end -}}
];

document.addEventListener('DOMContentLoaded', function() {
  function adjustLayout() {
    const header = document.querySelector('header');
    const main = document.querySelector('main');
    const searchModal = document.getElementById('search-modal');
    if (header && main) {
      main.style.paddingTop = (header.offsetHeight + 10) + 'px';
    }
    if (header && searchModal) {
      searchModal.style.top = header.offsetHeight + 'px';
    }
  }
  adjustLayout();
  window.addEventListener('resize', adjustLayout);

  function loadHitokoto() {
    const hitokotoText = document.getElementById('hitokoto-text');
    const hitokotoAuthor = document.getElementById('hitokoto-author');
    if (!hitokotoText) return;

    const cachedHitokoto = localStorage.getItem('hitokoto');
    const cachedAuthor = localStorage.getItem('hitokoto_author');
    const cacheTime = localStorage.getItem('hitokoto_time');
    const now = Date.now();
    const cacheDuration = 3600000;

    if (cachedHitokoto && cacheTime && (now - parseInt(cacheTime, 10)) < cacheDuration) {
      hitokotoText.textContent = cachedHitokoto;
      hitokotoText.style.opacity = '1';
      if (cachedAuthor && hitokotoAuthor) {
        hitokotoAuthor.textContent = cachedAuthor;
      }
    }

    fetch('https://v1.hitokoto.cn/?c=a&c=b&c=c&c=d&c=e&c=f&c=g', {
      method: 'GET',
      headers: {
        'Accept': 'application/json'
      },
      timeout: 5000
    })
      .then(response => {
        if (!response.ok) {
          throw new Error('Network response was not ok');
        }
        return response.json();
      })
      .then(data => {
        if (data && data.hitokoto) {
          hitokotoText.textContent = data.hitokoto;
          hitokotoText.style.opacity = '1';
          localStorage.setItem('hitokoto', data.hitokoto);
          localStorage.setItem('hitokoto_time', now.toString());
          if (data.from && hitokotoAuthor) {
            hitokotoAuthor.textContent = '—— ' + data.from;
            localStorage.setItem('hitokoto_author', '—— ' + data.from);
          }
        }
      })
      .catch(error => {
        console.error('Failed to load hitokoto:', error);
      });
  }
  loadHitokoto();

  const searchToggle = document.getElementById('search-toggle');
  const searchModal = document.getElementById('search-modal');
  const searchInput = document.getElementById('search-input');
  const searchClose = document.getElementById('search-close');
  const searchResults = document.getElementById('search-results');

  function toggleSearchModal(show) {
    if (show) {
      searchModal.classList.add('active');
      searchInput.focus();
    } else {
      searchModal.classList.remove('active');
      searchInput.value = '';
      searchResults.innerHTML = '';
    }
  }

  searchToggle?.addEventListener('click', function() {
    toggleSearchModal(!searchModal.classList.contains('active'));
  });

  searchClose?.addEventListener('click', function() {
    toggleSearchModal(false);
  });

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
      toggleSearchModal(false);
    }
    if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
      e.preventDefault();
      toggleSearchModal(!searchModal.classList.contains('active'));
    }
  });

  searchInput?.addEventListener('input', function() {
    const query = this.value.trim().toLowerCase();
    
    if (!query) {
      searchResults.innerHTML = '';
      return;
    }

    const sanitizedQuery = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    const results = searchData.filter(item => {
      const titleMatch = item.title?.toLowerCase().includes(query);
      const contentMatch = item.content?.toLowerCase().includes(query);
      const tagsMatch = Array.isArray(item.tags) && item.tags.some(tag => 
        typeof tag === 'string' && tag.toLowerCase().includes(query)
      );
      return titleMatch || contentMatch || tagsMatch;
    });

    displayResults(results, sanitizedQuery);
  });

  function highlightText(text, query) {
    if (!query || !text) return text;
    try {
      const regex = new RegExp(`(${query})`, 'gi');
      return text.replace(regex, '<span class="search-highlight">$1</span>');
    } catch {
      return text;
    }
  }

  function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  function displayResults(results, query) {
    if (results.length === 0) {
      searchResults.innerHTML = '<div class="no-results">未找到匹配的文章</div>';
      return;
    }

    searchResults.innerHTML = results.slice(0, 10).map(item => {
      const safeTitle = highlightText(escapeHtml(item.title || ''), query);
      const safeExcerpt = highlightText(escapeHtml(getExcerpt(item.content || '')), query);
      const safeUrl = escapeHtml(item.url || '#');
      const safeDate = escapeHtml(item.date || '');
      return `
        <div class="search-result-item">
          <a href="${safeUrl}" class="search-result-title">${safeTitle}</a>
          <p class="search-result-excerpt">${safeExcerpt}</p>
          <div class="search-result-meta">${safeDate}</div>
        </div>
      `;
    }).join('');
  }

  function getExcerpt(content) {
    if (!content) return '';
    const text = content.substring(0, 150);
    return text.endsWith(' ') ? text.trim() : text.trim() + '...';
  }

  const themeToggle = document.getElementById('theme-toggle');
  const sunIcon = document.getElementById('sun-icon');
  const moonIcon = document.getElementById('moon-icon');

  function setTheme(theme) {
    if (!['light', 'dark'].includes(theme)) {
      theme = 'light';
    }
    document.documentElement.setAttribute('data-theme', theme);
    localStorage.setItem('theme', theme);
    sunIcon.style.display = theme === 'dark' ? 'none' : 'block';
    moonIcon.style.display = theme === 'dark' ? 'block' : 'none';
  }

  const savedTheme = localStorage.getItem('theme') || 'light';
  setTheme(savedTheme);

  themeToggle?.addEventListener('click', function() {
    const currentTheme = document.documentElement.getAttribute('data-theme');
    const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
    setTheme(newTheme);
  });

  const backToTop = document.getElementById('back-to-top');
  if (backToTop) {
    window.addEventListener('scroll', function() {
      if (window.scrollY > 300) {
        backToTop.classList.add('visible');
      } else {
        backToTop.classList.remove('visible');
      }
    });
    backToTop.addEventListener('click', function() {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
  }
});
</script>
