{{ define "main" }}
  <div class="tag-page">
    <h1>标签</h1>
    <p class="tag-description">共 {{ len .Pages }} 个标签</p>
    
    <div class="tag-cloud">
      {{ range .Pages }}
      <a href="{{ .Permalink }}" class="tag-cloud-item">
        {{ .Title }}
        <span class="tag-cloud-count">{{ len .Pages }}</span>
      </a>
      {{ end }}
    </div>
  </div>
{{ end }}
